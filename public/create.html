<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewCode — Create</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/eclipse.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #F2EADF;
      color: #7857AB;
      padding: 0;
      margin: 0;
    }

    /* ── Top header bar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: #e8e2d6;
      border-bottom: 1px solid #e5e0d8;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar .back-arrow {
      color: #23307E;
      font-size: 1.3rem;
      text-decoration: none;
      font-weight: 700;
      line-height: 1;
      padding: 2px 6px;
    }
    .topbar .back-arrow:hover { color: #23307E; }

    .topbar .brand {
      font-size: 1.1rem;
      font-weight: 700;
      color: #23307E;
    }

    /* ── Page content wrapper ── */
    .page-content {
      padding: 20px 20px;
      max-width: 1500px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #23307E;
      margin-bottom: 12px;
    }

    /* ── Title + description inputs ── */
    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #23307E;
      margin-bottom: 4px;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #d5cfc6;
      background: #e8e2d6;
      color: #7857AB;
      font-size: 0.85rem;
      font-family: inherit;
    }

    .field input::placeholder,
    .field textarea::placeholder { color: #b0a89a; }

    .field textarea {
      resize: vertical;
      min-height: 56px;
    }

    /* ── Editor + Output row ── */
    .editor-row {
      display: flex;
      gap: 16px;
      height: 550px;
      margin-bottom: 12px;
    }

    .pane {
      background: #ffffff;
      border: 1px solid #e5e0d8;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane-editor { flex: 0 0 40%; }
    .pane-output { flex: 1; }

    .pane-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #23307E;
      padding: 6px 12px;
      background: #e8e2d6;
      border-bottom: 1px solid #e5e0d8;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pane-label .expand-btn {
      background: none;
      border: 1px solid #d5cfc6;
      color: #23307E;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }
    .pane-label .expand-btn:hover { color: #23307E; border-color: #23307E; }

    .pane-label .lang-inline {
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid #d5cfc6;
      background: #e8e2d6;
      color: #23307E;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
    }
    .pane-label .lang-inline:hover { border-color: #23307E; color: #23307E; }

    .pane-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Inline expand */
    .editor-row.expand-editor .pane-output { display: none; }
    .editor-row.expand-editor .pane-editor { flex: 1; }
    .editor-row.expand-output .pane-editor { display: none; }
    .editor-row.expand-output .pane-output { flex: 1; }

    /* Full-window expand */
    .pane.fullscreen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1000;
      border-radius: 0;
      border: none;
    }
    .pane.fullscreen .expand-fw::after { content: " ✕"; font-size: 0.7rem; }

    .pane-body {
      flex: 1;
      overflow: hidden;
    }

    .pane-body .CodeMirror {
      height: 100% !important;
      font-size: 13px;
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
    }

    .output-inner {
      height: 100%;
      overflow: auto;
    }

    iframe {
      width: 100%; height: 100%;
      border: none;
      background: #fff;
    }

    .output-text {
      padding: 12px 16px;
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 13px;
      white-space: pre-wrap;
      color: #7857AB;
    }
    .output-text.error { color: #f38ba8; }
    .output-text.empty  { color: #b0a89a; font-style: italic; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #b0a89a;
      flex-shrink: 0;
    }
    .status-dot.ok  { background: #23307E; }
    .status-dot.err { background: #f38ba8; }

    /* ── Controls row ── */
    .controls-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .controls-row button {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #d5cfc6;
      background: #e5e0d8;
      color: #7857AB;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .controls-row button.run-btn {
      background: #23307E;
      color: #ffffff;
      font-weight: 600;
      border: none;
    }
    .controls-row button.run-btn:hover { background: #23307E; }

    .controls-row button.publish-btn {
      background: #23307E;
      color: #ffffff;
      font-weight: 600;
      border: none;
      padding: 6px 22px;
    }
    .controls-row button.publish-btn:hover { background: #9b7cc9; }
  </style>
</head>
<body>

<header class="topbar">
  <a href="/main.html" class="back-arrow">&larr;</a>
  <span class="brand">NewCode</span>
</header>

<div class="page-content">

<h1>Create New Snippet</h1>

<div class="field">
  <label for="titleInput">Title</label>
  <input type="text" id="titleInput" placeholder="Give your snippet a name…" maxlength="100">
</div>

<div class="field">
  <label for="descInput">Description</label>
  <textarea id="descInput" placeholder="Describe what your code does…"></textarea>
</div>

<!-- Editor + Output row -->
<div class="editor-row">
  <div class="pane pane-editor">
    <div class="pane-label">Editor <span class="pane-actions"><select id="language" class="lang-inline"><option value="html">HTML</option><option value="python">Python</option></select><button class="expand-btn expand-inline" id="inlineEditor" title="Expand to fill row">↔</button><button class="expand-btn expand-fw" id="expandEditor" title="Full window">⛶</button></span></div>
    <div class="pane-body" id="editorContainer"></div>
  </div>
  <div class="pane pane-output">
    <div class="pane-label">
      Output
      <span class="status-dot" id="statusDot"></span>
      <span class="pane-actions"><button class="expand-btn expand-inline" id="inlineOutput" title="Expand to fill row">↔</button><button class="expand-btn expand-fw" id="expandOutput" title="Full window">⛶</button></span>
    </div>
    <div class="pane-body output-inner" id="output"></div>
  </div>
</div>

<!-- Controls -->
<div class="controls-row">
  <button class="run-btn" id="runBtn">▶ Run</button>
  <button class="publish-btn" id="publishBtn">Publish</button>
</div>

</div><!-- /page-content -->

<!-- CodeMirror -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>

<script>
  // ── Default snippets ──
  const defaults = {
    html: `<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    h1 { color: #333; }
  </style>
</head>
<body>
  <h1>Hello, World!</h1>
  <p>Type HTML here and click Run to preview.</p>
</body>
</html>`,

    python: `print("Hello, World!")

for i in range(5):
    print(f"Line {i + 1}")`,

  };

  // ── CodeMirror (editable) ──
  const cm = CodeMirror(document.getElementById("editorContainer"), {
    value: defaults.html,
    mode: "htmlmixed",
    theme: "eclipse",
    lineNumbers: true,
    indentUnit: 2,
    tabSize: 2,
    lineWrapping: true,
  });

  // ── DOM refs ──
  const langSelect = document.getElementById("language");
  const runBtn     = document.getElementById("runBtn");
  const output     = document.getElementById("output");
  const statusDot  = document.getElementById("statusDot");
