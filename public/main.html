<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewCode</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      background: #11111b;
      border-bottom: 1px solid #313244;
    }

    .topbar .brand {
      font-size: 1.1rem;
      font-weight: 700;
      color: #cba6f7;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    h1 { font-size: 2rem; color: #cba6f7; margin-bottom: 8px; }
    p  { color: #a6adc8; margin-bottom: 32px; font-size: 1rem; }

    .card-grid {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 10px;
      padding: 24px 32px;
      width: 240px;
      text-decoration: none;
      color: #cdd6f4;
      transition: border-color 0.2s, transform 0.15s;
    }
    .card:hover {
      border-color: #cba6f7;
      transform: translateY(-2px);
    }

    .card h2 { font-size: 1rem; color: #cba6f7; margin-bottom: 6px; }
    .card p  { font-size: 0.8rem; color: #6c7086; margin: 0; }
  </style>
</head>
<body>

<header class="topbar">
  <span class="brand">NewCode</span>
</header>

<main>
  <h1>NewCode</h1>
  <p>Share and explore code snippets</p>

  <div class="card-grid">
    <a href="/index.html" class="card">
      <h2>View Demo</h2>
      <p>See a sample code snippet with live output</p>
    </a>
  </div>
</main>

</body>
</html>
